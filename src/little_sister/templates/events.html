<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
    {% include '_header.html' %}

    <div class="container-fluid mt-3 px-4">
        <h1 class="h4 mb-3">Events</h1>
        <table class="table table-sm align-middle">
            <thead>
                <tr><th>When</th><th>Status</th><th>Service</th><th>Reason</th></tr>
            </thead>
            <tbody>
                {% for e in events %}
                    <tr class="row-{{ e.new | status_slug }}">
                        <td class="text-nowrap">{{ e.timestamp | localtime }}</td>
                        <td>{{ e.new.name.lower() }}</td>
                        <td class="text-muted">{{ e.path }}</td>
                        <td class="md-body">{{ e.reason | join('; ') | markdown_inline }}</td>
                    </tr>
                {% else %}
                    <tr><td colspan="4" class="text-muted">No events yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
